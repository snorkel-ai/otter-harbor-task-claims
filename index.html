<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Otter Harbor Claims</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #161a24;
        --muted: #687083;
        --border: #dfe3ea;
        --soft: #f1f3f7;
        --blue: #2563eb;
        --blue-dark: #1d4ed8;
        --green-soft: #e8f6ee;
        --yellow-soft: #fff7df;
        --purple-soft: #eef0ff;
        --red-soft: #fdecec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }

      header {
        max-width: 1180px;
        margin: 0 auto;
        padding: 42px 28px 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 4vw, 48px);
        line-height: 1.08;
        letter-spacing: -0.035em;
        font-weight: 700;
      }

      .subtitle {
        margin-top: 14px;
        max-width: 620px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.45;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 16px 28px 64px;
      }

      .search-shell {
        margin: 24px auto 40px;
        max-width: 760px;
        display: grid;
        grid-template-columns: 1fr 210px;
        gap: 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 999px;
        box-shadow: 0 18px 50px rgba(17, 24, 39, 0.08);
        overflow: hidden;
      }

      .search-part,
      .filter-part {
        padding: 16px 22px;
      }

      .search-part {
        border-right: 1px solid var(--border);
      }

      .label {
        display: block;
        margin-bottom: 6px;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      input,
      select {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 18px;
      }

      input::placeholder {
        color: #a0a6b2;
      }

      .stats {
        display: none;
      }

      .section-heading {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 0 0 18px;
      }

      .section-heading h2 {
        margin: 0;
        font-size: 24px;
        letter-spacing: -0.03em;
      }

      .count-bubble {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 30px;
        height: 24px;
        border-radius: 999px;
        background: #ebeef3;
        color: var(--muted);
        font-weight: 700;
        font-size: 13px;
      }

      .task-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .task {
        display: flex;
        flex-direction: column;
        min-height: 300px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      }

      .task:hover {
        transform: translateY(-2px);
        border-color: #cbd2dc;
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
      }

      .eyebrow {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 5px 10px;
        color: #434a58;
        background: var(--soft);
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .Available {
        background: var(--green-soft);
        color: #24633f;
      }

      .Claimed {
        background: var(--yellow-soft);
        color: #72520b;
      }

      .Submitted {
        background: var(--purple-soft);
        color: #35418f;
      }

      .Approved {
        background: #e0f4e6;
        color: #1f6b3a;
      }

      .Blocked {
        background: var(--red-soft);
        color: #9b2828;
      }

      .task-title {
        margin: 0 0 10px;
        font-size: 20px;
        line-height: 1.25;
        letter-spacing: -0.025em;
        font-weight: 800;
      }

      .task-id {
        margin: 0 0 18px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
      }

      .preview {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.45;
      }

      .task-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: auto;
        padding-top: 18px;
        border-top: 1px solid #edf0f4;
      }

      .link-button,
      .primary-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        padding: 11px 14px;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }

      .link-button {
        color: var(--text);
        background: transparent;
      }

      .primary-button {
        color: #ffffff;
        background: var(--blue);
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
      }

      .primary-button:hover {
        background: var(--blue-dark);
      }

      .empty {
        padding: 36px;
        border: 1px dashed var(--border);
        border-radius: 18px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.7);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        background: rgba(17, 24, 39, 0.78);
      }

      .modal {
        position: relative;
        width: min(1080px, 100%);
        max-height: 88vh;
        overflow: auto;
        background: #ffffff;
        border-radius: 28px;
        padding: 46px 54px 36px;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
      }

      .modal-close {
        position: absolute;
        top: 22px;
        right: 22px;
        border: 0;
        width: 38px;
        height: 38px;
        border-radius: 999px;
        background: #f1f3f7;
        color: var(--text);
        cursor: pointer;
        font-size: 22px;
        line-height: 1;
      }

      .modal h2 {
        margin: 20px 0 8px;
        max-width: 850px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.05;
        letter-spacing: -0.045em;
      }

      .modal .task-id {
        margin-bottom: 22px;
        font-size: 15px;
      }

      .modal-section {
        margin-top: 24px;
      }

      .modal-section h3 {
        margin: 0 0 10px;
        font-size: 15px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .modal-section p,
      .modal-section pre {
        margin: 0;
        color: #4b5565;
        font-size: 18px;
        line-height: 1.55;
      }

      .modal-section pre {
        white-space: pre-wrap;
        font-family: inherit;
        background: #f4f5f8;
        border-radius: 14px;
        padding: 18px;
      }

      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 14px;
        margin-top: 34px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
      }

      @media (max-width: 900px) {
        .task-grid {
          grid-template-columns: 1fr;
        }

        .search-shell {
          grid-template-columns: 1fr;
          border-radius: 24px;
        }

        .search-part {
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        .modal {
          padding: 34px 26px 28px;
          border-radius: 22px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Harbor Task Claims</h1>
      <div class="subtitle">Browse available research tasks, review the details, and claim one to start building.</div>
    </header>

    <main>
      <div class="search-shell">
        <div class="search-part">
          <span class="label">Where</span>
          <input id="search" placeholder="Search tasks..." oninput="render()">
        </div>
        <div class="filter-part">
          <span class="label">Status</span>
          <select id="statusFilter" onchange="render()">
            <option value="Available">Available</option>
            <option value="Claimed">Claimed</option>
            <option value="Submitted">Submitted</option>
            <option value="Approved">Approved</option>
            <option value="Blocked">Blocked</option>
            <option value="All">All</option>
          </select>
        </div>
      </div>

      <div class="stats" id="stats"></div>

      <div class="section-heading">
        <h2 id="sectionTitle">Available Harbor Tasks</h2>
        <span class="count-bubble" id="visibleCount">0</span>
      </div>

      <div id="taskList">Loading tasks...</div>
    </main>

    <script>
      let TASKS = [];

      async function loadTasks() {
        const response = await fetch('tasks.json', { cache: 'no-store' });
        TASKS = await response.json();
        render();
      }

      function render() {
        renderStats();
        renderTaskList();
      }

      function renderStats() {
        const counts = {
          available: TASKS.filter(t => t.status === 'Available').length,
          claimed: TASKS.filter(t => t.status === 'Claimed').length,
          submitted: TASKS.filter(t => t.status === 'Submitted').length,
          approved: TASKS.filter(t => t.status === 'Approved').length
        };

        document.getElementById('stats').innerHTML = `
          <div>${counts.available} Available</div>
          <div>${counts.claimed} Claimed</div>
          <div>${counts.submitted} Submitted</div>
          <div>${counts.approved} Approved</div>
        `;
      }

      function renderTaskList() {
        const q = document.getElementById('search').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;

        const tasks = TASKS.filter(task => {
          const blob = [
            task.task_id,
            task.domain,
            task.subdomain,
            task.paper_title,
            task.venue_year,
            task.priority,
            task.task_concept
          ].join(' ').toLowerCase();

          const matchesText = !q || blob.includes(q);
          const matchesStatus = status === 'All' || task.status === status;

          return matchesText && matchesStatus;
        });

        document.getElementById('visibleCount').textContent = tasks.length;
        document.getElementById('sectionTitle').textContent =
          status === 'All' ? 'All Harbor Tasks' : `${status} Harbor Tasks`;

        const taskList = document.getElementById('taskList');

        if (!tasks.length) {
          taskList.innerHTML = '<div class="empty">No matching tasks.</div>';
          return;
        }

        taskList.innerHTML = `
          <div class="task-grid">
            ${tasks.map(task => `
              <article class="task">
                <div class="eyebrow">
                  <span class="pill ${escapeHtml(task.status)}">${escapeHtml(task.status)}</span>
                  <span class="pill">${escapeHtml(task.domain || '')}</span>
                  <span class="pill">${escapeHtml(task.subdomain || '')}</span>
                </div>

                <h3 class="task-title">${escapeHtml(task.paper_title)}</h3>
                <p class="task-id">#${escapeHtml(task.task_id)} · ${escapeHtml(task.venue_year || '')}</p>

                <p class="preview">${escapeHtml(shorten(task.task_concept || '', 210))}</p>

                <div class="task-footer">
                  <a class="link-button" href="#" onclick="openTaskDetails('${escapeAttr(String(task.task_id))}'); return false;">View details</a>
                  ${task.status === 'Available' ? `<a class="primary-button" href="#" onclick="requestClaim('${escapeAttr(String(task.task_id))}'); return false;">Claim task</a>` : ''}
                </div>
              </article>
            `).join('')}
          </div>
        `;
      }

      function openTaskDetails(taskId) {
        const task = TASKS.find(t => String(t.task_id) === String(taskId));

        if (!task) {
          alert('Could not find task #' + taskId);
          return;
        }

        const sourcesHtml = task.sources && task.sources.length
          ? task.sources.map((source, index) => `
              <a class="primary-button" href="${escapeAttr(source)}" target="_blank">Source ${index + 1}</a>
            `).join('')
          : '<p>No sources listed.</p>';

        const modal = document.createElement('div');
        modal.className = 'modal-backdrop';
        modal.onclick = function(event) {
          if (event.target === modal) {
            modal.remove();
          }
        };

        modal.innerHTML = `
          <div class="modal">
            <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">×</button>

            <div class="eyebrow">
              <span class="pill">${escapeHtml(task.domain || '')}</span>
              <span class="pill">${escapeHtml(task.subdomain || '')}</span>
            </div>

            <h2>${escapeHtml(task.paper_title)}</h2>
            <p class="task-id">#${escapeHtml(task.task_id)} · ${escapeHtml(task.venue_year || '')}</p>

            <div class="eyebrow">
              <span class="pill ${escapeHtml(task.status)}">${escapeHtml(task.status)}</span>
              <span class="pill">Priority: ${escapeHtml(task.priority || '')}</span>
            </div>

            <div class="modal-section">
              <p>${escapeHtml(task.task_concept || 'No task concept listed.')}</p>
            </div>

            <div class="modal-section">
              <h3>Suggested Harbor Steps</h3>
              <pre>${escapeHtml(task.suggested_harbor_steps || 'No suggested steps listed.')}</pre>
            </div>

            <div class="modal-section">
              <h3>Verifier Ideas</h3>
              <p>${escapeHtml(task.verifier_ideas || 'No verifier ideas listed.')}</p>
            </div>

            <div class="modal-section">
              <h3>Sources</h3>
              <div>${sourcesHtml}</div>
            </div>

            <div class="modal-footer">
              <a class="link-button" href="#" onclick="this.closest('.modal-backdrop').remove(); return false;">Cancel</a>
              ${task.status === 'Available' ? `<a class="primary-button" href="#" onclick="requestClaim('${escapeAttr(String(task.task_id))}'); return false;">Claim task</a>` : ''}
            </div>
          </div>
        `;

        document.body.appendChild(modal);
      }

      function requestClaim(taskId) {
        const task = TASKS.find(t => String(t.task_id) === String(taskId));

        if (!task) {
          alert('Could not find task #' + taskId);
          return;
        }

        const repoUrl = 'https://github.com/snorkel-ai/otter-harbor-claims/issues/new';
        const params = new URLSearchParams({
          template: 'claim_request.yml',
          title: `[Claim Request] Task #${task.task_id}`,
          labels: 'claim-request'
        });

        window.open(`${repoUrl}?${params.toString()}`, '_blank');
      }

      function shorten(value, maxLength) {
        const text = String(value || '');
        if (text.length <= maxLength) return text;
        return text.slice(0, maxLength).trim() + '...';
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, '&#096;');
      }

      loadTasks();
    </script>
  </body>
</html>
