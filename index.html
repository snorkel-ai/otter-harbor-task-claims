<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Otter Harbor Claims</title>

    <style>
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #161a24;
        --muted: #687083;
        --border: #dfe3ea;
        --soft: #f1f3f7;
        --blue: #2563eb;
        --blue-dark: #1d4ed8;
        --green-soft: #e8f6ee;
        --yellow-soft: #fff7df;
        --purple-soft: #eef0ff;
        --red-soft: #fdecec;
        --orange-soft: #fff3df;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }

      header {
        max-width: 1180px;
        margin: 0 auto;
        padding: 42px 28px 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 4vw, 48px);
        line-height: 1.08;
        letter-spacing: -0.035em;
        font-weight: 700;
      }

      .subtitle {
        margin-top: 14px;
        max-width: 720px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.45;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 16px 28px 64px;
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }

      .identity {
        color: var(--muted);
        font-size: 14px;
      }

      .panel-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin: 22px 0 28px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 12px 32px rgba(17, 24, 39, 0.05);
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 20px;
        letter-spacing: -0.025em;
      }

      .panel p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.45;
      }

      .panel-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .message {
        display: none;
        margin: 16px 0;
        border-radius: 14px;
        padding: 14px 16px;
        background: var(--green-soft);
        color: #24633f;
        font-weight: 700;
      }

      .error {
        display: none;
        margin: 16px 0;
        border-radius: 14px;
        padding: 14px 16px;
        background: var(--red-soft);
        color: #9b2828;
        font-weight: 700;
        white-space: pre-wrap;
      }

      .search-shell {
        margin: 24px auto 40px;
        max-width: 760px;
        display: grid;
        grid-template-columns: 1fr 210px;
        gap: 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 999px;
        box-shadow: 0 18px 50px rgba(17, 24, 39, 0.08);
        overflow: hidden;
      }

      .search-part,
      .filter-part {
        padding: 16px 22px;
      }

      .search-part {
        border-right: 1px solid var(--border);
      }

      .label {
        display: block;
        margin-bottom: 6px;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      input,
      select {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 18px;
      }

      .panel input,
      .modal input,
      .modal textarea {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        background: #fff;
      }

      .modal textarea {
        width: 100%;
        min-height: 110px;
        resize: vertical;
        font: inherit;
      }

      input::placeholder {
        color: #a0a6b2;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 26px;
      }

      .stat {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
      }

      .stat strong {
        display: block;
        font-size: 24px;
      }

      .stat span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .section-heading {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 0 0 18px;
      }

      .section-heading h2 {
        margin: 0;
        font-size: 24px;
        letter-spacing: -0.03em;
      }

      .count-bubble {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 30px;
        height: 24px;
        border-radius: 999px;
        background: #ebeef3;
        color: var(--muted);
        font-weight: 700;
        font-size: 13px;
      }

      .task-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .task {
        display: flex;
        flex-direction: column;
        min-height: 300px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      }

      .task:hover {
        transform: translateY(-2px);
        border-color: #cbd2dc;
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
      }

      .eyebrow {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 5px 10px;
        color: #434a58;
        background: var(--soft);
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .Available {
        background: var(--green-soft);
        color: #24633f;
      }

      .Claimed {
        background: var(--yellow-soft);
        color: #72520b;
      }

      .Submitted {
        background: var(--purple-soft);
        color: #35418f;
      }

      .Approved {
        background: #e0f4e6;
        color: #1f6b3a;
      }

      .Blocked {
        background: var(--red-soft);
        color: #9b2828;
      }

      .Expired,
      .Abandoned,
      .Reopened {
        background: var(--soft);
        color: var(--muted);
      }

      .task-title {
        margin: 0 0 10px;
        font-size: 20px;
        line-height: 1.25;
        letter-spacing: -0.025em;
        font-weight: 800;
      }

      .task-id {
        margin: 0 0 18px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
      }

      .preview {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.45;
      }

      .task-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: auto;
        padding-top: 18px;
        border-top: 1px solid #edf0f4;
      }

      .link-button,
      .primary-button,
      .danger-button,
      .success-button,
      .warning-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 12px;
        padding: 11px 14px;
        font-weight: 800;
        font-size: 15px;
        text-decoration: none;
        cursor: pointer;
      }

      .link-button {
        color: var(--text);
        background: transparent;
      }

      .primary-button {
        color: #ffffff;
        background: var(--blue);
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
      }

      .primary-button:hover {
        background: var(--blue-dark);
      }

      .danger-button {
        color: #9b2828;
        background: var(--red-soft);
      }

      .success-button {
        color: #1f6b3a;
        background: var(--green-soft);
      }

      .warning-button {
        color: #72520b;
        background: var(--orange-soft);
      }

      button:disabled,
      a.disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .empty {
        padding: 36px;
        border: 1px dashed var(--border);
        border-radius: 18px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.7);
      }

      .list-item {
        border-top: 1px solid #edf0f4;
        padding: 12px 0;
      }

      .list-item:first-of-type {
        border-top: 0;
      }

      .list-title {
        font-weight: 800;
      }

      .muted {
        color: var(--muted);
        font-size: 14px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        background: rgba(17, 24, 39, 0.78);
      }

      .modal {
        position: relative;
        width: min(1080px, 100%);
        max-height: 88vh;
        overflow: auto;
        background: #ffffff;
        border-radius: 28px;
        padding: 46px 54px 36px;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
      }

      .modal-close {
        position: absolute;
        top: 22px;
        right: 22px;
        border: 0;
        width: 38px;
        height: 38px;
        border-radius: 999px;
        background: #f1f3f7;
        color: var(--text);
        cursor: pointer;
        font-size: 22px;
        line-height: 1;
      }

      .modal h2 {
        margin: 20px 0 8px;
        max-width: 850px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.05;
        letter-spacing: -0.045em;
      }

      .modal .task-id {
        margin-bottom: 22px;
        font-size: 15px;
      }

      .modal-section {
        margin-top: 24px;
      }

      .modal-section h3 {
        margin: 0 0 10px;
        font-size: 15px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .modal-section p,
      .modal-section pre {
        margin: 0;
        color: #4b5565;
        font-size: 18px;
        line-height: 1.55;
      }

      .modal-section pre {
        white-space: pre-wrap;
        font-family: inherit;
        background: #f4f5f8;
        border-radius: 14px;
        padding: 18px;
      }

      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 14px;
        margin-top: 34px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
      }

      @media (max-width: 900px) {
        .panel-grid,
        .task-grid,
        .stats {
          grid-template-columns: 1fr;
        }

        .search-shell {
          grid-template-columns: 1fr;
          border-radius: 24px;
        }

        .search-part {
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        .top-bar {
          align-items: flex-start;
          flex-direction: column;
        }

        .modal {
          padding: 34px 26px 28px;
          border-radius: 22px;
        }
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <header>
      <h1>Harbor Task Claims</h1>
      <div class="subtitle">Browse available research tasks, claim one task at a time, submit your Snorkel Submission ID, and track review status.</div>
    </header>

    <main>
      <div class="top-bar">
        <div class="identity" id="identity">Loading session...</div>
        <div>
          <button class="primary-button" id="signInButton" onclick="signInWithGitHub()">Sign in with GitHub</button>
          <button class="link-button" id="signOutButton" onclick="signOut()" style="display: none;">Sign out</button>
        </div>
      </div>

      <div id="message" class="message"></div>
      <div id="error" class="error"></div>

      <div class="stats" id="stats"></div>

      <div class="panel-grid">
        <div class="panel" id="myClaimPanel"></div>
        <div class="panel" id="submittedPanel"></div>
      </div>

      <div class="panel" id="adminPanel" style="display: none;"></div>

      <div class="search-shell">
        <div class="search-part">
          <span class="label">Where</span>
          <input id="search" placeholder="Search tasks... e.g. by domain" oninput="renderTaskList()">
        </div>

        <div class="filter-part">
          <span class="label">Status</span>
          <select id="statusFilter" onchange="renderTaskList()">
            <option value="All">All</option>
            <option value="My Claims">My Claims</option>
            <option value="Available">Available</option>
            <option value="Claimed">Claimed</option>
            <option value="Submitted">Submitted</option>
            <option value="Approved">Approved</option>
            <option value="Blocked">Blocked</option>
          </select>
        </div>
      </div>

      <div class="section-heading">
        <h2 id="sectionTitle">All Harbor Tasks</h2>
        <span class="count-bubble" id="visibleCount">0</span>
      </div>

      <div id="taskList">Loading tasks...</div>
    </main>

    <script>
      const CLAIM_TTL_HOURS = 24;
      const ADMIN_EMAILS = [
        "tyler.davis@snorkel.ai",
        "cairo.simpson@snorkel.ai",
        "fernando.perezrivera@snorkel.ai"
      ];

      let TASKS = [];
      let CLAIMS = [];
      let currentUser = null;

      const SUPABASE_URL = "https://mgvckvbwwbbnifjxkfzk.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ndmNrdmJ3d2JibmlmanhrZnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTQ4NDYsImV4cCI6MjA5NzE5MDg0Nn0.2oDcKT_oBX5U1gXKH_-7EKCEgDSAyoiMHol6XdXCiJM";

      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      async function loadSession() {
        const { data, error } = await supabaseClient.auth.getSession();

        if (error) {
          console.error(error);
          showError("Could not load session.");
          return;
        }

        currentUser = data.session?.user || null;
      }

      async function signInWithGitHub() {
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: "github",
          options: {
            redirectTo: "https://snorkel-ai.github.io/otter-harbor-claims/"
          }
        });

        if (error) {
          console.error(error);
          showError("Could not start GitHub sign-in.");
        }
      }

      async function signOut() {
        await supabaseClient.auth.signOut();
        currentUser = null;
        await loadTasks();
      }

      function isAdmin() {
        const email = String(currentUser?.email || "").toLowerCase();
        return ADMIN_EMAILS.includes(email);
      }

      async function expireOldClaims() {
        const { error } = await supabaseClient.rpc("expire_old_harbor_claims");

        if (error) {
          console.error(error);
        }
      }

      async function loadTasks() {
        clearMessage();
        clearError();

        await expireOldClaims();

        const { data: tasksData, error: tasksError } = await supabaseClient
          .from("harbor_tasks")
          .select("*")
          .order("display_id", { ascending: true });

        if (tasksError) {
          console.error(tasksError);
          showError("Could not load tasks from Supabase.");
          return;
        }

        const { data: claimsData, error: claimsError } = await supabaseClient
          .from("harbor_selected_tasks")
          .select("id, task_id, user_id, user_email, status, snorkel_submission_id, selected_at, submitted_for_review_at, completed_at, reviewed_by, reviewed_at, expires_at, admin_email, notes")
          .order("selected_at", { ascending: false });

        if (claimsError) {
          console.error(claimsError);
          showError("Could not load claim state from Supabase.");
          return;
        }

        CLAIMS = claimsData || [];

        TASKS = (tasksData || []).map(task => {
          const activeClaim = getCurrentClaimForTask(task.id);
          const ownedByCurrentUser = Boolean(
            activeClaim &&
            currentUser &&
            activeClaim.user_id === currentUser.id
          );

          return {
            ...task,
            task_id: task.display_id,
            status: activeClaim ? claimStatusLabel(activeClaim.status) : "Available",
            active_claim_id: activeClaim?.id || null,
            active_claim_user_id: activeClaim?.user_id || null,
            active_claim_email: activeClaim?.user_email || "",
            active_claim_owned_by_me: ownedByCurrentUser,
            active_claim_submission_id: activeClaim?.snorkel_submission_id || "",
            active_claim_selected_at: activeClaim?.selected_at || "",
            active_claim_expires_at: activeClaim?.expires_at || "",
            active_claim_submitted_at: activeClaim?.submitted_for_review_at || "",
            active_claim_completed_at: activeClaim?.completed_at || ""
          };
        });

        render();
      }

      function getCurrentClaimForTask(taskUuid) {
        return CLAIMS.find(claim => {
          return claim.task_id === taskUuid &&
            ["claimed", "submitted", "approved", "blocked"].includes(claim.status);
        }) || null;
      }

      function getMyActiveClaim() {
        if (!currentUser) return null;

        return TASKS.find(task =>
          task.status === "Claimed" &&
          task.active_claim_owned_by_me
        ) || null;
      }

      function getMySubmittedTasks() {
        if (!currentUser) return [];

        return TASKS.filter(task =>
          task.active_claim_owned_by_me &&
          ["Submitted", "Approved"].includes(task.status)
        );
      }

      function getAdminReviewQueue() {
        if (!isAdmin()) return [];

        return TASKS.filter(task => task.status === "Submitted");
      }

      function claimStatusLabel(status) {
        if (status === "claimed") return "Claimed";
        if (status === "submitted") return "Submitted";
        if (status === "approved") return "Approved";
        if (status === "blocked") return "Blocked";
        return "Available";
      }

      function render() {
        renderIdentity();
        renderStats();
        renderMyClaimPanel();
        renderSubmittedPanel();
        renderAdminPanel();
        renderTaskList();
      }

      function renderIdentity() {
        const identity = document.getElementById("identity");
        const signInButton = document.getElementById("signInButton");
        const signOutButton = document.getElementById("signOutButton");

        if (!currentUser) {
          identity.textContent = "Not signed in.";
          signInButton.style.display = "inline-flex";
          signOutButton.style.display = "none";
          return;
        }

        identity.textContent = `Signed in as ${currentUser.email || currentUser.id}${isAdmin() ? " · Admin" : ""}`;
        signInButton.style.display = "none";
        signOutButton.style.display = "inline-flex";
      }

      function renderStats() {
        const counts = {
          total: TASKS.length,
          available: TASKS.filter(t => t.status === "Available").length,
          claimed: TASKS.filter(t => t.status === "Claimed").length,
          submitted: TASKS.filter(t => t.status === "Submitted").length,
          approved: TASKS.filter(t => t.status === "Approved").length
        };

        document.getElementById("stats").innerHTML = `
          <div class="stat"><strong>${counts.total}</strong><span>Total</span></div>
          <div class="stat"><strong>${counts.available}</strong><span>Available</span></div>
          <div class="stat"><strong>${counts.claimed}</strong><span>Claimed</span></div>
          <div class="stat"><strong>${counts.submitted}</strong><span>Submitted</span></div>
          <div class="stat"><strong>${counts.approved}</strong><span>Approved</span></div>
        `;
      }

      function renderMyClaimPanel() {
        const panel = document.getElementById("myClaimPanel");

        if (!currentUser) {
          panel.innerHTML = `
            <h2>Your active claim</h2>
            <p>Sign in with GitHub to claim and submit tasks.</p>
            <div class="panel-actions">
              <button class="primary-button" onclick="signInWithGitHub()">Sign in with GitHub</button>
            </div>
          `;
          return;
        }

        const claim = getMyActiveClaim();

        if (!claim) {
          panel.innerHTML = `
            <h2>Your active claim</h2>
            <p>You do not currently have an active claim.</p>
          `;
          return;
        }

        panel.innerHTML = `
          <h2>Your active claim</h2>
          <div class="list-title">#${escapeHtml(claim.task_id)} — ${escapeHtml(claim.paper_title)}</div>
          <div class="muted">Claimed ${formatDate(claim.active_claim_selected_at)}</div>
          <div class="muted">Expires ${formatDate(claim.active_claim_expires_at)}</div>

          <div style="margin-top: 14px;">
            <input id="snorkelSubmissionId" placeholder="Snorkel Submission ID">
          </div>

          <div class="panel-actions">
            <button class="success-button" onclick="submitMyClaim()">Submit</button>
            <button class="danger-button" onclick="releaseMyClaim()">Release</button>
          </div>
        `;
      }

      function renderSubmittedPanel() {
        const panel = document.getElementById("submittedPanel");

        if (!currentUser) {
          panel.innerHTML = `
            <h2>Your submitted tasks</h2>
            <p>Sign in to see your submitted tasks.</p>
          `;
          return;
        }

        const submitted = getMySubmittedTasks();

        if (!submitted.length) {
          panel.innerHTML = `
            <h2>Your submitted tasks</h2>
            <p>No submitted tasks yet.</p>
          `;
          return;
        }

        panel.innerHTML = `
          <h2>Your submitted tasks</h2>
          ${submitted.slice(0, 10).map(task => `
            <div class="list-item">
              <div class="list-title">#${escapeHtml(task.task_id)} — ${escapeHtml(task.paper_title)}</div>
              <div class="muted">Status: ${escapeHtml(task.status)}</div>
              <div class="muted">Submitted: ${formatDate(task.active_claim_submitted_at)}</div>
              <div class="muted">Snorkel Submission ID: ${escapeHtml(task.active_claim_submission_id || "")}</div>
            </div>
          `).join("")}
        `;
      }

      function renderAdminPanel() {
        const panel = document.getElementById("adminPanel");

        if (!isAdmin()) {
          panel.style.display = "none";
          panel.innerHTML = "";
          return;
        }

        panel.style.display = "block";

        const queue = getAdminReviewQueue();

        panel.innerHTML = `
          <h2>Admin tools</h2>
          <p>Use these tools carefully. Clear expired claims only affects claims past the 24-hour window.</p>
          <div class="panel-actions">
            <button class="primary-button" onclick="openAddTaskModal()">Add task</button>
            <button class="warning-button" onclick="clearExpiredClaims()">Clear expired claims</button>
          </div>

          <div style="margin-top: 22px;">
            <h2>Admin review queue</h2>
            ${queue.length ? `
              <p>Approve if the example was used. Reopen if it should return to the available pool.</p>
              ${queue.map(task => `
                <div class="list-item">
                  <div class="list-title">#${escapeHtml(task.task_id)} — ${escapeHtml(task.paper_title)}</div>
                  <div class="muted">Submitted by: ${escapeHtml(task.active_claim_email || "")}</div>
                  <div class="muted">Submitted at: ${formatDate(task.active_claim_submitted_at)}</div>
                  <div class="muted">Snorkel Submission ID: ${escapeHtml(task.active_claim_submission_id || "")}</div>
                  <div class="panel-actions">
                    <button class="success-button" onclick="approveTask('${escapeAttr(String(task.task_id))}')">Approve</button>
                    <button class="warning-button" onclick="undoSubmittedOrApprovedTask('${escapeAttr(String(task.task_id))}')">Undo submission</button>
                  </div>
                </div>
              `).join("")}
            ` : `
              <p>No submitted tasks are waiting for review.</p>
            `}
          </div>
        `;
      }

      function renderTaskList() {
        const q = document.getElementById("search").value.toLowerCase();
        const status = document.getElementById("statusFilter").value;

        const tasks = TASKS.filter(task => {
          const blob = [
            task.task_id,
            task.domain,
            task.subdomain,
            task.paper_title,
            task.venue_year,
            task.priority,
            task.task_concept,
            task.active_claim_email
          ].join(" ").toLowerCase();

          const matchesText = !q || blob.includes(q);

          let matchesStatus = true;

          if (status === "My Claims") {
            matchesStatus = Boolean(task.active_claim_owned_by_me);
          } else if (status !== "All") {
            matchesStatus = task.status === status;
          }

          return matchesText && matchesStatus;
        });

        document.getElementById("visibleCount").textContent = tasks.length;
        document.getElementById("sectionTitle").textContent =
          status === "All" ? "All Harbor Tasks" : `${status} Harbor Tasks`;

        const taskList = document.getElementById("taskList");

        if (!tasks.length) {
          taskList.innerHTML = '<div class="empty">No matching tasks.</div>';
          return;
        }

        taskList.innerHTML = `
          <div class="task-grid">
            ${tasks.map(task => `
              <article class="task">
                <div class="eyebrow">
                  <span class="pill ${escapeHtml(task.status)}">${escapeHtml(task.status)}</span>
                  <span class="pill">${escapeHtml(task.domain || "")}</span>
                  <span class="pill">${escapeHtml(task.subdomain || "")}</span>
                </div>

                <h3 class="task-title">${escapeHtml(task.paper_title)}</h3>
                <p class="task-id">#${escapeHtml(task.task_id)} · ${escapeHtml(task.venue_year || "")}</p>

                <p class="preview">${escapeHtml(shorten(task.task_concept || "", 210))}</p>

                ${task.status !== "Available" && task.active_claim_email ? `
                  <p class="muted">${escapeHtml(task.status)} by ${escapeHtml(task.active_claim_email)}</p>
                ` : ""}

                <div class="task-footer">
                  <a class="link-button" href="#" onclick="openTaskDetails('${escapeAttr(String(task.task_id))}'); return false;">View details</a>
                  ${renderTaskAction(task)}
                </div>
              </article>
            `).join("")}
          </div>
        `;
      }

      function renderTaskAction(task) {
        const actions = [];

        if (task.status === "Available") {
          actions.push(`<a class="primary-button" href="#" onclick="claimTask('${escapeAttr(String(task.task_id))}'); return false;">Claim task</a>`);
        }

        if (task.active_claim_owned_by_me && task.status === "Claimed") {
          actions.push(`<a class="danger-button" href="#" onclick="releaseMyClaim(); return false;">Release</a>`);
        }

        if (task.active_claim_owned_by_me && task.status === "Submitted") {
          actions.push(`<span class="pill Submitted">Waiting for review</span>`);
        }

        if (isAdmin() && ["Submitted", "Approved"].includes(task.status)) {
          actions.push(`<a class="warning-button" href="#" onclick="undoSubmittedOrApprovedTask('${escapeAttr(String(task.task_id))}'); return false;">Undo submission</a>`);
        }

        return actions.join("");
      }

      function openTaskDetails(taskId) {
        const task = TASKS.find(t => String(t.task_id) === String(taskId));

        if (!task) {
          alert("Could not find task #" + taskId);
          return;
        }

        const sourcesHtml = Array.isArray(task.sources) && task.sources.length
          ? task.sources.map((source, index) => `
              <a class="primary-button" href="${escapeAttr(source)}" target="_blank" rel="noopener noreferrer">Source ${index + 1}</a>
            `).join("")
          : "<p>No sources listed.</p>";

        const modal = document.createElement("div");
        modal.className = "modal-backdrop";

        modal.onclick = function(event) {
          if (event.target === modal) {
            modal.remove();
          }
        };

        modal.innerHTML = `
          <div class="modal">
            <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">×</button>

            <div class="eyebrow">
              <span class="pill">${escapeHtml(task.domain || "")}</span>
              <span class="pill">${escapeHtml(task.subdomain || "")}</span>
            </div>

            <h2>${escapeHtml(task.paper_title)}</h2>
            <p class="task-id">#${escapeHtml(task.task_id)} · ${escapeHtml(task.venue_year || "")}</p>

            <div class="eyebrow">
              <span class="pill ${escapeHtml(task.status)}">${escapeHtml(task.status)}</span>
              <span class="pill">Priority: ${escapeHtml(task.priority || "")}</span>
            </div>

            <div class="modal-section">
              <p>${escapeHtml(task.task_concept || "No task concept listed.")}</p>
            </div>

            <div class="modal-section">
              <h3>Suggested Harbor Steps</h3>
              <pre>${escapeHtml(task.suggested_harbor_steps || "No suggested steps listed.")}</pre>
            </div>

            <div class="modal-section">
              <h3>Verifier Ideas</h3>
              <p>${escapeHtml(task.verifier_ideas || "No verifier ideas listed.")}</p>
            </div>

            <div class="modal-section">
              <h3>Sources</h3>
              <div>${sourcesHtml}</div>
            </div>

            ${task.status !== "Available" ? `
              <div class="modal-section">
                <h3>Claim Status</h3>
                <p>${escapeHtml(task.status)}${task.active_claim_email ? " by " + escapeHtml(task.active_claim_email) : ""}</p>
              </div>
            ` : ""}

            <div class="modal-footer">
              <a class="link-button" href="#" onclick="this.closest('.modal-backdrop').remove(); return false;">Cancel</a>
              ${renderTaskAction(task)}
            </div>
          </div>
        `;

        document.body.appendChild(modal);
      }

      async function claimTask(taskId) {
        clearMessage();
        clearError();

        const task = TASKS.find(t => String(t.task_id) === String(taskId));

        if (!task) {
          showError("Could not find task #" + taskId);
          return;
        }

        if (!currentUser) {
          await signInWithGitHub();
          return;
        }

        const myActiveClaim = getMyActiveClaim();

        if (myActiveClaim) {
          showError("You already have an active claim. Submit or release it before claiming another task.");
          return;
        }

        if (task.status !== "Available") {
          showError("This task is not available.");
          return;
        }

        const now = new Date();
        const expiresAt = new Date(now.getTime() + CLAIM_TTL_HOURS * 60 * 60 * 1000);

        const { error } = await supabaseClient
          .from("harbor_selected_tasks")
          .insert({
            task_id: task.id,
            user_id: currentUser.id,
            user_email: currentUser.email || null,
            status: "claimed",
            selected_at: now.toISOString(),
            expires_at: expiresAt.toISOString()
          });

        if (error) {
          console.error(error);
          showError("Could not claim this task. It may already be claimed, or you may already have an active claim.");
          return;
        }

        showMessage("Task claimed.");
        await loadTasks();
      }

      async function releaseMyClaim() {
        clearMessage();
        clearError();

        if (!currentUser) {
          await signInWithGitHub();
          return;
        }

        const claim = getMyActiveClaim();

        if (!claim || !claim.active_claim_id) {
          showError("You do not have an active claim.");
          return;
        }

        const { error } = await supabaseClient
          .from("harbor_selected_tasks")
          .update({
            status: "abandoned",
            expires_at: null,
            notes: "Released by contributor"
          })
          .eq("id", claim.active_claim_id)
          .eq("user_id", currentUser.id);

        if (error) {
          console.error(error);
          showError("Could not release your claim.");
          return;
        }

        showMessage("Claim released.");
        await loadTasks();
      }

      async function submitMyClaim() {
        clearMessage();
        clearError();

        if (!currentUser) {
          await signInWithGitHub();
          return;
        }

        const claim = getMyActiveClaim();

        if (!claim || !claim.active_claim_id) {
          showError("You do not have an active claim to submit.");
          return;
        }

        const submissionInput = document.getElementById("snorkelSubmissionId");
        const submissionId = String(submissionInput?.value || "").trim();

        if (!submissionId) {
          showError("Snorkel Submission ID is required.");
          return;
        }

        const now = new Date().toISOString();

        const { error } = await supabaseClient
          .from("harbor_selected_tasks")
          .update({
            status: "submitted",
            snorkel_submission_id: submissionId,
            submitted_for_review_at: now,
            expires_at: null
          })
          .eq("id", claim.active_claim_id)
          .eq("user_id", currentUser.id);

        if (error) {
          console.error(error);
          showError("Could not submit your claim.");
          return;
        }

        showMessage("Task submitted for review.");
        await loadTasks();
      }

      async function approveTask(taskId) {
        clearMessage();
        clearError();

        if (!isAdmin()) {
          showError("You do not have permission to approve tasks.");
          return;
        }

        const task = TASKS.find(t => String(t.task_id) === String(taskId));

        if (!task || task.status !== "Submitted") {
          showError("This task is not currently submitted for review.");
          return;
        }

        const now = new Date().toISOString();

        const { error } = await supabaseClient
          .from("harbor_selected_tasks")
          .update({
            status: "approved",
            completed_at: now,
            reviewed_at: now,
            reviewed_by: currentUser.id,
            admin_email: currentUser.email || null
          })
          .eq("id", task.active_claim_id);

        if (error) {
          console.error(error);
          showError("Could not approve this task.");
          return;
        }

        showMessage("Task approved.");
        await loadTasks();
      }

      async function undoSubmittedOrApprovedTask(taskId) {
        clearMessage();
        clearError();

        if (!isAdmin()) {
          showError("You do not have permission to undo submissions.");
          return;
        }

        const task = TASKS.find(t => String(t.task_id) === String(taskId));

        if (!task || !["Submitted", "Approved"].includes(task.status)) {
          showError("This task is not currently submitted or approved.");
          return;
        }

        const warning = "Warning: this will undo an accepted/submitted task and return it to the available pool. Only continue if the submission was accepted by mistake or needs to be reassigned.";

        if (!window.confirm(warning)) {
          return;
        }

        const now = new Date().toISOString();

        const { error } = await supabaseClient
          .from("harbor_selected_tasks")
          .update({
            status: "reopened",
            reviewed_at: now,
            reviewed_by: currentUser.id,
            admin_email: currentUser.email || null,
            expires_at: null,
            notes: "Submission/approval undone by admin"
          })
          .eq("id", task.active_claim_id);

        if (error) {
          console.error(error);
          showError("Could not undo this submission.");
          return;
        }

        showMessage("Submission undone. Task returned to available pool.");
        await loadTasks();
      }

      async function clearExpiredClaims() {
        clearMessage();
        clearError();

        if (!isAdmin()) {
          showError("You do not have permission to clear expired claims.");
          return;
        }

        const { data, error } = await supabaseClient.rpc("clear_expired_harbor_claims");

        if (error) {
          console.error(error);
          showError("Could not clear expired claims.");
          return;
        }

        const count = Number(data || 0);
        showMessage(`${count} expired claim(s) cleared.`);
        await loadTasks();
      }


      function openAddTaskModal() {
        if (!isAdmin()) {
          showError("You do not have permission to add tasks.");
          return;
        }

        const modal = document.createElement("div");
        modal.className = "modal-backdrop";

        modal.onclick = function(event) {
          if (event.target === modal) {
            modal.remove();
          }
        };

        modal.innerHTML = `
          <div class="modal">
            <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">×</button>

            <h2>Add task</h2>
            <p class="muted">This adds or updates one Harbor task by Display ID. It does not touch claims, submissions, or approvals.</p>

            <div class="modal-section">
              <h3>Display ID</h3>
              <input id="newTaskDisplayId" placeholder="51">
            </div>

            <div class="modal-section">
              <h3>Priority</h3>
              <input id="newTaskPriority" placeholder="Candidate">
            </div>

            <div class="modal-section">
              <h3>Domain</h3>
              <input id="newTaskDomain" placeholder="CV, Graph, Tabular ML, Multimodal">
            </div>

            <div class="modal-section">
              <h3>Subdomain</h3>
              <input id="newTaskSubdomain" placeholder="Anomaly Detection">
            </div>

            <div class="modal-section">
              <h3>Paper title</h3>
              <input id="newTaskPaperTitle" placeholder="Paper title">
            </div>

            <div class="modal-section">
              <h3>Venue / year</h3>
              <input id="newTaskVenueYear" placeholder="CVPR 2026">
            </div>

            <div class="modal-section">
              <h3>Sources</h3>
              <textarea id="newTaskSources" placeholder="One URL per line"></textarea>
            </div>

            <div class="modal-section">
              <h3>Task concept</h3>
              <textarea id="newTaskConcept" placeholder="Build a system that..."></textarea>
            </div>

            <div class="modal-section">
              <h3>Suggested Harbor steps</h3>
              <textarea id="newTaskSteps" placeholder="1. data-and-setup: ...&#10;2. model-development: ...&#10;3. evaluation-and-reporting: ..."></textarea>
            </div>

            <div class="modal-section">
              <h3>Verifier ideas</h3>
              <textarea id="newTaskVerifierIdeas" placeholder="Training works; Metrics computed; Report written"></textarea>
            </div>

            <div class="modal-footer">
              <a class="link-button" href="#" onclick="this.closest('.modal-backdrop').remove(); return false;">Cancel</a>
              <button class="primary-button" onclick="submitNewTask()">Add task</button>
            </div>
          </div>
        `;

        document.body.appendChild(modal);
      }

      async function submitNewTask() {
        clearMessage();
        clearError();

        if (!isAdmin()) {
          showError("You do not have permission to add tasks.");
          return;
        }

        const displayId = String(document.getElementById("newTaskDisplayId")?.value || "").trim();
        const priority = String(document.getElementById("newTaskPriority")?.value || "").trim();
        const domain = String(document.getElementById("newTaskDomain")?.value || "").trim();
        const subdomain = String(document.getElementById("newTaskSubdomain")?.value || "").trim();
        const paperTitle = String(document.getElementById("newTaskPaperTitle")?.value || "").trim();
        const venueYear = String(document.getElementById("newTaskVenueYear")?.value || "").trim();
        const sourcesText = String(document.getElementById("newTaskSources")?.value || "").trim();
        const taskConcept = String(document.getElementById("newTaskConcept")?.value || "").trim();
        const suggestedSteps = String(document.getElementById("newTaskSteps")?.value || "").trim();
        const verifierIdeas = String(document.getElementById("newTaskVerifierIdeas")?.value || "").trim();

        if (!displayId) {
          showError("Display ID is required.");
          return;
        }

        if (!paperTitle) {
          showError("Paper title is required.");
          return;
        }

        const existingTask = TASKS.find(task => String(task.task_id) === String(displayId));

        if (existingTask) {
          const ok = window.confirm("A task with this Display ID already exists. Continue to update it?");
          if (!ok) return;
        }

        const sources = sourcesText
          ? sourcesText
              .split(/
|,/)
              .map(source => source.trim())
              .filter(Boolean)
          : [];

        const { error } = await supabaseClient
          .from("harbor_tasks")
          .upsert({
            display_id: displayId,
            priority,
            domain,
            subdomain,
            paper_title: paperTitle,
            venue_year: venueYear,
            sources,
            task_concept: taskConcept,
            suggested_harbor_steps: suggestedSteps,
            verifier_ideas: verifierIdeas
          }, {
            onConflict: "display_id"
          });

        if (error) {
          console.error(error);
          showError("Could not add this task.");
          return;
        }

        const modal = document.querySelector(".modal-backdrop");
        if (modal) modal.remove();

        showMessage(existingTask ? "Task updated." : "Task added.");
        await loadTasks();
      }

      function showMessage(message) {
        const el = document.getElementById("message");
        el.textContent = message || "";
        el.style.display = message ? "block" : "none";

        if (message) {
          alert(message);
        }
      }

      function showError(message) {
        const el = document.getElementById("error");
        el.textContent = message || "";
        el.style.display = message ? "block" : "none";

        if (message) {
          alert(message);
        }
      }

      function clearMessage() {
        const el = document.getElementById("message");
        el.textContent = "";
        el.style.display = "none";
      }

      function clearError() {
        const el = document.getElementById("error");
        el.textContent = "";
        el.style.display = "none";
      }

      function shorten(value, maxLength) {
        const text = String(value || "");
        if (text.length <= maxLength) return text;
        return text.slice(0, maxLength).trim() + "...";
      }

      function formatDate(value) {
        if (!value) return "";

        const date = new Date(value);

        if (isNaN(date.getTime())) return "";

        return date.toLocaleString();
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, "&#096;");
      }

      async function init() {
        await loadSession();
        await loadTasks();
      }

      init();
    </script>
  </body>
</html>
