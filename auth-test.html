<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Otter Harbor Auth Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      color: #111827;
      margin: 0;
      padding: 40px;
    }

    .card {
      max-width: 760px;
      margin: 0 auto;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    code, pre {
      background: #f3f4f6;
      border-radius: 10px;
    }

    code {
      padding: 2px 6px;
    }

    pre {
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .muted {
      color: #6b7280;
    }

    .success {
      color: #047857;
      font-weight: 700;
    }

    .error {
      color: #b91c1c;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Otter Harbor GitHub Auth Test</h1>
    <p class="muted">
      This page tests whether we can sign in with GitHub and silently create a structured issue.
    </p>

    <button id="loginButton" onclick="startDeviceLogin()">Sign in with GitHub</button>
    <button id="issueButton" onclick="createTestIssue()" disabled>Create test claim issue</button>

    <h2>Status</h2>
    <pre id="status">Ready.</pre>
  </div>

  <script>
    const CLIENT_ID = "Iv23liSNriIPXj0b4sKX";
    const OWNER = "snorkel-ai";
    const REPO = "otter-harbor-claims";

    let accessToken = localStorage.getItem("harbor_github_token") || "";
    let githubUser = null;

    const statusEl = document.getElementById("status");
    const loginButton = document.getElementById("loginButton");
    const issueButton = document.getElementById("issueButton");

    function log(message) {
      statusEl.textContent = message;
    }

    async function githubFetch(url, options = {}) {
      const response = await fetch(url, {
        ...options,
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${accessToken}`,
          "X-GitHub-Api-Version": "2022-11-28",
          ...(options.headers || {})
        }
      });

      const text = await response.text();
      let data = null;

      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = text;
      }

      if (!response.ok) {
        throw new Error(`${response.status} ${response.statusText}\n${JSON.stringify(data, null, 2)}`);
      }

      return data;
    }

    async function loadExistingSession() {
      if (!accessToken) return;

      try {
        githubUser = await githubFetch("https://api.github.com/user");
        loginButton.textContent = `Signed in as ${githubUser.login}`;
        issueButton.disabled = false;
        log(`Signed in as ${githubUser.login}. Ready to create a test issue.`);
      } catch (error) {
        localStorage.removeItem("harbor_github_token");
        accessToken = "";
        log(`Saved token did not work. Sign in again.\n\n${error.message}`);
      }
    }

    async function startDeviceLogin() {
      loginButton.disabled = true;
      issueButton.disabled = true;

      try {
        log("Requesting GitHub device code...");

        const codeResponse = await fetch("https://github.com/login/device/code", {
          method: "POST",
          headers: {
            "Accept": "application/json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            client_id: CLIENT_ID,
            scope: "public_repo read:user"
          })
        });

        const codeData = await codeResponse.json();

        if (codeData.error) {
          throw new Error(JSON.stringify(codeData, null, 2));
        }

        log(
          `Open this URL:\n\n${codeData.verification_uri}\n\n` +
          `Enter this code:\n\n${codeData.user_code}\n\n` +
          `Waiting for authorization...`
        );

        window.open(codeData.verification_uri, "_blank");

        const intervalSeconds = codeData.interval || 5;
        const expiresAt = Date.now() + codeData.expires_in * 1000;

        while (Date.now() < expiresAt) {
          await new Promise(resolve => setTimeout(resolve, intervalSeconds * 1000));

          const tokenResponse = await fetch("https://github.com/login/oauth/access_token", {
            method: "POST",
            headers: {
              "Accept": "application/json",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              client_id: CLIENT_ID,
              device_code: codeData.device_code,
              grant_type: "urn:ietf:params:oauth:grant-type:device_code"
            })
          });

          const tokenData = await tokenResponse.json();

          if (tokenData.error === "authorization_pending") {
            continue;
          }

          if (tokenData.error === "slow_down") {
            await new Promise(resolve => setTimeout(resolve, 5000));
            continue;
          }

          if (tokenData.error) {
            throw new Error(JSON.stringify(tokenData, null, 2));
          }

          accessToken = tokenData.access_token;
          localStorage.setItem("harbor_github_token", accessToken);

          githubUser = await githubFetch("https://api.github.com/user");
          loginButton.textContent = `Signed in as ${githubUser.login}`;
          issueButton.disabled = false;

          log(`Signed in as ${githubUser.login}. Ready to create a test issue.`);
          return;
        }

        throw new Error("Device login expired. Try again.");
      } catch (error) {
        log(`Auth failed:\n\n${error.message}`);
      } finally {
        loginButton.disabled = false;
      }
    }

    async function createTestIssue() {
      issueButton.disabled = true;

      try {
        if (!accessToken || !githubUser) {
          throw new Error("Not signed in.");
        }

        const issueBody = [
          "harbor_action: claim",
          "task_id: 1",
          "task_title: RobustAD: Real-World Robustness in Industrial Anomaly Detection",
          `github_user: ${githubUser.login}`,
          "",
          "This is an auth-test issue created from the Otter Harbor GitHub Pages dashboard."
        ].join("\n");

        const issue = await githubFetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title: `[Harbor Auth Test] Claim Task #1 by ${githubUser.login}`,
            body: issueBody
          })
        });

        log(
          `Success. Test issue created:\n\n${issue.html_url}\n\n` +
          `If this worked, we can wire the same flow into the real Claim task button.`
        );
      } catch (error) {
        log(`Issue creation failed:\n\n${error.message}`);
      } finally {
        issueButton.disabled = false;
      }
    }

    loadExistingSession();
  </script>
</body>
</html>
