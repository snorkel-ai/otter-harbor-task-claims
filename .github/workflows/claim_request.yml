name: Process claim request

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process-claim:
    if: contains(github.event.issue.labels.*.name, 'claim-request')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Process claim request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const issue = context.payload.issue;
            const body = issue.body || '';

            const taskIdMatch = body.match(/### Task ID\s+([^\n\r]+)/i);
            const taskId = taskIdMatch ? taskIdMatch[1].trim() : '';

            if (!taskId) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Could not process this claim request because no Task ID was found.'
              });
              return;
            }

            const tasksPath = 'tasks.json';
            const tasks = JSON.parse(fs.readFileSync(tasksPath, 'utf8'));
            const task = tasks.find(t => String(t.task_id) === String(taskId));

            if (!task) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Could not find Task #${taskId} in tasks.json.`
              });
              return;
            }

            if (task.status !== 'Available') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Task #${taskId} is not available. Current status: ${task.status}.`
              });
              return;
            }

            task.status = 'Claimed';

            fs.writeFileSync(tasksPath, JSON.stringify(tasks, null, 2) + '\n');

            await exec.exec('git', ['config', 'user.name', 'github-actions[bot]']);
            await exec.exec('git', ['config', 'user.email', 'github-actions[bot]@users.noreply.github.com']);
            await exec.exec('git', ['add', tasksPath]);
            await exec.exec('git', ['commit', '-m', `Claim task #${taskId}`]);
            await exec.exec('git', ['push']);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Task #${taskId} has been marked as Claimed.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });
